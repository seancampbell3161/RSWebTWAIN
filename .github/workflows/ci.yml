name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Create sidecar placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path src-tauri/binaries/twain-scanner-32bit-x86_64-pc-windows-msvc.exe | Out-Null

      - name: Check main app
        run: cargo check -p scan-agent

      - name: Check sidecar
        run: cargo check -p scanner-sidecar

      - name: Clippy
        run: cargo clippy -p scan-agent -p scanner-sidecar -- -D warnings

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Create sidecar placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path src-tauri/binaries/twain-scanner-32bit-x86_64-pc-windows-msvc.exe | Out-Null

      - name: Run tests
        run: cargo test -p scan-agent
