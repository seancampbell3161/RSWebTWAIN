name: Build MSI Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # --- Build 32-bit sidecar ---
      - name: Build 32-bit sidecar
        run: cargo build --release --target i686-pc-windows-msvc -p scanner-sidecar

      - name: Copy sidecar to binaries directory
        shell: pwsh
        run: |
          $sidecarDir = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $sidecarDir | Out-Null
          Copy-Item "target/i686-pc-windows-msvc/release/twain-scanner-32bit.exe" `
            "$sidecarDir/twain-scanner-32bit-x86_64-pc-windows-msvc.exe"

      # --- Install Tauri CLI ---
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # --- Build MSI ---
      - name: Build Tauri app (MSI)
        run: cargo tauri build
        env:
          # Disable debug assertions for production
          CARGO_PROFILE_RELEASE_DEBUG: "false"

      # --- Upload artifact ---
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-agent-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: error

      # --- Create GitHub release (only on tag push) ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
